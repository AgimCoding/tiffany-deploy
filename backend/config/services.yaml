parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Domain layer - exclude entities (not services)
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/Entity/'
            - '../src/Domain/ValueObject/'
            - '../src/Kernel.php'

    # Bind ports (interfaces) to their infrastructure implementations
    App\Domain\Port\UserRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineUserRepository

    App\Domain\Port\ServiceRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineServiceRepository

    App\Domain\Port\AppointmentRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineAppointmentRepository

    App\Domain\Port\ProductRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineProductRepository

    App\Domain\Port\OrderRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineOrderRepository

    App\Domain\Port\PortfolioItemRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePortfolioItemRepository

    App\Domain\Port\SiteSettingRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineSiteSettingRepository

    App\Domain\Port\FamilyMemberRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineFamilyMemberRepository

    App\Domain\Port\PortfolioAlbumRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePortfolioAlbumRepository

    App\Domain\Port\ProductCategoryRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineProductCategoryRepository

    App\Domain\Port\AdminLogRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineAdminLogRepository

    App\Domain\Port\PushSubscriptionRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePushSubscriptionRepository
